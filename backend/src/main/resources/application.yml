spring:
  application:
    name: bookingshow-intern

  datasource:
    url: jdbc:mysql://localhost:3306/bookingshow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

logging:
  level:
    com.bookingshow: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG